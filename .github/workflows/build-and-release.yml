name: Build and Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    env:
      CONFIGURATION: Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install .NET Framework 4.5.2 Developer Pack
        shell: pwsh
        run: choco install netfx-4.5.2-devpack -y --no-progress

      - name: Run core tests
        shell: pwsh
        run: dotnet run --project .\tools\UclLiuCoreTests\UclLiuCoreTests.csproj

      - name: Build WinForms app
        shell: pwsh
        run: msbuild .\uclliu.csproj /m /p:Configuration=$env:CONFIGURATION /p:Platform=AnyCPU

      - name: Package release assets
        shell: pwsh
        run: |
          $version = if ($env:GITHUB_REF_TYPE -eq "tag") { $env:GITHUB_REF_NAME } else { "ci-$env:GITHUB_SHA".Substring(0, 10) }
          .\tools\package-release.ps1 -Version $version -Configuration $env:CONFIGURATION -OutputDirectory .\artifacts

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: uclliu-build-${{ github.run_number }}
          path: |
            artifacts/uclliu-*.zip
            artifacts/uclliu.exe
            artifacts/release-notes.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $zip = Join-Path "artifacts" ("uclliu-" + $tag + ".zip")
          $exe = Join-Path "artifacts" "uclliu.exe"
          $notes = Join-Path "artifacts" "release-notes.md"

          if (-not (Test-Path -LiteralPath $zip)) { throw "Missing release zip: $zip" }
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing release exe: $exe" }
          if (-not (Test-Path -LiteralPath $notes)) { throw "Missing release notes: $notes" }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $zip $exe --clobber
            gh release edit $tag --title "UCL_LIU_CSharp $tag" --notes-file $notes
          } else {
            gh release create $tag $zip $exe --title "UCL_LIU_CSharp $tag" --notes-file $notes
          }
